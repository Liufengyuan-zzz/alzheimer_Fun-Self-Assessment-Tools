<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿尔茨海默症风险自测工具</title>
    <style>
        :root {
            --primary-color: #9b59b6;
            --primary-light: rgba(165, 119, 217, 0.5);
            --bg-color: #f8f9fa;
            --white: #ffffff;
            --text-main: #333333;
            --text-secondary: #666666;
            --low-risk: #27ae60;
            --mid-risk: #f1c40f;
            --high-risk: #e74c3c;
            --border-radius: 16px;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; }
        
        .app-container {
            width: 100%;
            max-width: 600px;
            background: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .header {
            background: var(--primary-color);
            color: var(--white);
            padding: 24px;
            text-align: center;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
        }

        .header h1 { font-size: 22px; font-weight: 600; }
        .progress-bar-container { width: 100%; height: 6px; background: rgba(255,255,255,0.3); border-radius: 4px; margin-top: 16px; overflow: hidden; display: none; }
        .progress-bar { height: 100%; background: var(--white); width: 0%; transition: width 0.3s ease; }

        .content { flex: 1; padding: 24px; display: flex; flex-direction: column; overflow-y: auto; }
        
        .view-section { display: none; flex-direction: column; height: 100%; animation: fadeIn 0.4s ease; }
        .view-section.active { display: flex; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn {
            background: var(--primary-color);
            color: var(--white);
            border: none;
            padding: 16px;
            border-radius: var(--border-radius);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            margin-top: auto;
        }
        .btn:hover { background: #8e44ad; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        .intro-text { line-height: 1.6; margin-bottom: 20px; font-size: 16px; color: var(--text-secondary); }
        .intro-card { background: var(--primary-light); padding: 16px; border-radius: 12px; margin-bottom: 24px; color: #5a2e6b; font-weight: 500; }

        .question-title { font-size: 20px; font-weight: bold; margin-bottom: 8px; color: var(--primary-color); }
        .question-desc { font-size: 15px; color: var(--text-secondary); margin-bottom: 24px; }
        
        .svg-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
        .svg-card {
            background: #fdfdfd;
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .svg-image { width: 80px; height: 80px; margin-bottom: 8px; }
        
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .input-field { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; transition: border-color 0.2s; }
        .input-field:focus { border-color: var(--primary-color); outline: none; }
        
        /* Options grid for selection questions */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .option-card {
            border: 2px solid #ddd; border-radius: 12px; padding: 16px; text-align: center;
            cursor: pointer; transition: all 0.2s;
        }
        .option-card:hover { border-color: var(--primary-light); }
        .option-card.selected { border-color: var(--primary-color); background-color: rgba(155, 89, 182, 0.1); }
        .option-card svg { width: 80px; height: 80px; margin-bottom: 10px; }

        /* Yes/No list */
        .yn-item { background: #f9f9f9; padding: 16px; border-radius: 12px; margin-bottom: 12px; display: flex; flex-direction: column; }
        .yn-text { font-weight: 500; margin-bottom: 12px; }
        .yn-buttons { display: flex; gap: 10px; }
        .yn-btn {
            flex: 1; padding: 10px; border: 2px solid #eee; background: white; border-radius: 8px; cursor: pointer; font-weight: 600; color: var(--text-secondary); transition: 0.2s;
        }
        .yn-btn.selected { border-color: var(--primary-color); background: var(--primary-color); color: white; }

        .timer-box { font-size: 24px; font-weight: bold; color: var(--primary-color); text-align: center; margin-bottom: 20px; }
        
        .result-circle { width: 160px; height: 160px; border-radius: 50%; border: 12px solid #e0e0e0; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; }
        .result-title { text-align: center; font-size: 24px; font-weight: bold; margin-bottom: 12px; }
        .result-desc { text-align: center; color: var(--text-secondary); font-size: 16px; line-height: 1.6; margin-bottom: 30px; }
        
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>阿尔茨海默症风险自测工具</h1>
            <div id="progressContainer" class="progress-bar-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
        </div>

        <div class="content">
            <!-- 欢迎页 -->
            <div id="view-intro" class="view-section active">
                <h2 class="question-title">欢迎使用自测工具</h2>
                <div class="intro-card">
                    本工具参考临床常用的Mini-Cog与AD-8量表原理，通过趣味性互动帮助您快速评估认知健康状况。<br>
                    <strong>注：本测试仅供自测参考，不可替代专业医疗诊断。</strong>
                </div>
                <p class="intro-text">
                    • 测试包含 8 道小题<br>
                    • 预计总耗时 2-3 分钟<br>
                    • 请在安静舒适的环境下进行测试<br>
                    • 部分题目存在时间限制，请做好准备
                </p>
                <button class="btn" onclick="startTest()">开始测试</button>
            </div>

            <!-- 答题容器 -->
            <div id="view-quiz" class="view-section">
                <!-- 动态渲染内容 -->
            </div>

            <!-- 结果页 -->
            <div id="view-result" class="view-section">
                <div id="resultCircle" class="result-circle">0分</div>
                <h2 id="resultTitle" class="result-title">评估结果</h2>
                <div class="intro-card" style="margin-bottom: 16px;">
                    总分：<span id="resultScore" style="font-weight:bold; font-size: 20px;">0/24</span>
                </div>
                <p id="resultDesc" class="result-desc"></p>
                <button class="btn" onclick="location.reload()">重新测试</button>
            </div>
        </div>
    </div>
    
    <!-- Scripts 会通过外部引入或内联 -->
    <script src="test-logic.js"></script>
</body>
</html>
